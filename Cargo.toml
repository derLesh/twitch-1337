[package]
name = "twitch-1337"
version = "0.1.0"
edition = "2024"

[dependencies]
async-trait = "0.1.89"
chrono = "0.4.42"
chrono-tz = { version = "0.10.4", features = ["filter-by-regex"] }
color-eyre = "0.6"
rand = "0.9.2"
ron = "0.12.0"
secrecy = { version = "0.10", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.48.0", features = [
  "macros",
  "rt-multi-thread",
  "signal",
  "time",
  "fs",
] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
twitch-irc = { version = "5.0.1", default-features = false, features = [
  "refreshing-token-rustls-webpki-roots",
  "transport-tcp-rustls-webpki-roots",
] }
reqwest = { version = "0.12", default-features = false, features = [
  "json",
  "rustls-tls-webpki-roots",
] }
eyre = "0.6.12"
tracing-error = "0.2.1"
toml = "0.9.11"
notify-debouncer-mini = "0.5"
random-flight = { git = "https://github.com/Chronophylos/random-flight.git" }
csv = "1.4.0"
