{% extends "base.html" %}
{% block title %}Memory — twitch-1337{% endblock %}
{% block content %}
<div class="page-head">
  <div>
    <h1>Memory</h1>
    <p class="page-sub">Markdown files under <code>$DATA_DIR/memories/</code>.</p>
  </div>
</div>

<div class="stat-strip">
  <a class="stat" href="/memory/soul" style="text-decoration:none;color:inherit;">
    <div class="stat-label">SOUL</div>
    <div class="stat-value">— <span class="stat-unit">memories/SOUL.md</span></div>
  </a>
  <a class="stat" href="/memory/lore" style="text-decoration:none;color:inherit;">
    <div class="stat-label">LORE</div>
    <div class="stat-value">— <span class="stat-unit">memories/LORE.md</span></div>
  </a>
  <a class="stat" href="/memory/users" style="text-decoration:none;color:inherit;">
    <div class="stat-label">Users</div>
    <div class="stat-value">{{ user_count }} <span class="stat-unit">users</span></div>
  </a>
  <a class="stat" href="/memory/state" style="text-decoration:none;color:inherit;">
    <div class="stat-label">State</div>
    <div class="stat-value">{{ state_count }} <span class="stat-unit">state</span></div>
  </a>
</div>
{% endblock %}
