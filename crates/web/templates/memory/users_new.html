{% extends "base.html" %}
{% block title %}New user note — twitch-1337{% endblock %}
{% block content %}
<a href="/memory/users" class="link muted" style="display:inline-block;margin-bottom:6px;">← Back</a>
<div class="page-head">
  <div>
    <h1>New user note</h1>
    <p class="page-sub">Create a per-user character sheet at <code>memories/users/&lt;id&gt;.md</code>. 4 KiB cap.</p>
  </div>
</div>

<form method="post" action="/memory/users/new" style="display:flex;flex-direction:column;gap:12px;max-width:420px;">
  <input type="hidden" name="_csrf" value="{{ csrf }}">
  <label>
    <div class="muted" style="font-size:12px;margin-bottom:4px;">Twitch user id</div>
    <input type="text" class="input" name="user_id" placeholder="e.g. 1234567" pattern="[0-9]{1,32}" inputmode="numeric" required autocomplete="off" spellcheck="false" autofocus>
  </label>
  <div class="page-actions" style="gap:8px;">
    <button type="submit" class="btn primary">Create</button>
    <a class="btn" href="/memory/users">Cancel</a>
  </div>
</form>
{% endblock %}
